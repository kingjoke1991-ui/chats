services:
  postgres:
    image: postgres:16-alpine
    container_name: chat-oracle-postgres
    env_file:
      - ../../.env
    restart: unless-stopped
    volumes:
      - chat_oracle_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_oracle -d chat_oracle"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: chat-oracle-redis
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - chat_oracle_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  searxng:
    image: ghcr.io/searxng/searxng:latest
    container_name: chat-oracle-searxng
    environment:
      SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
    volumes:
      - ../searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/search?q=test&format=json', timeout=10).read()",
        ]
      interval: 20s
      timeout: 10s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: chat-oracle-app
    env_file:
      - ../../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_BIND_PORT:-18000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  chat_oracle_postgres:
  chat_oracle_redis:
